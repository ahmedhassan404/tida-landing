<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="TIDA Business Solutions — strategy, marketing, technology, ERP, media, and financial solutions."
    />
    <meta name="theme-color" content="#FAFAFA" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TIDA Business Solutions" />
    <meta
      property="og:title"
      content="TIDA Business Solutions | Strategy, Technology & Growth"
    />
    <meta
      property="og:description"
      content="TIDA Business Solutions brings strategy, marketing, digital products, ERP, media, and accounting support into one growth system."
    />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="TIDA Business Solutions | Strategy, Technology & Growth"
    />
    <meta
      name="twitter:description"
      content="TIDA Business Solutions brings strategy, marketing, digital products, ERP, media, and accounting support into one growth system."
    />
    <script>
      (() => {
        const savedTheme = localStorage.getItem("tida-theme");
        const systemTheme = window.matchMedia("(prefers-color-scheme: light)").matches
          ? "light"
          : "dark";
        const theme = savedTheme || systemTheme;
        const language = localStorage.getItem("tida-language") === "ar" ? "ar" : "en";
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        document.documentElement.lang = language;
        document.documentElement.dir = language === "ar" ? "rtl" : "ltr";
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute("content", theme === "light" ? "#FAFAFA" : "#0E0E0E");
      })();
    </script>
    <title>TIDA Business Solutions</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
